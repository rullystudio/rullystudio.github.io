<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue YouTube Audio Player</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f4f9; }
        .player-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; cursor: pointer; background: #ff0000; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background: #cc0000; }
        /* Menyembunyikan IFrame agar tidak terlihat */
        .hidden-player { position: absolute; top: -9999px; left: -9999px; }
    </style>
</head>
<body>

<div id="app" class="player-card">
    <h2>YouTube Audio Player</h2>
    <p>Status: <strong>{{ status }}</strong></p>
    
    <div class="controls">
        <button @click="togglePlay">{{ isPlaying ? 'Jeda' : 'Putar' }}</button>
    </div>

    <div id="youtube-player" class="hidden-player"></div>
</div>

<script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
        setup() {
            const isPlaying = ref(false);
            const status = ref('Memuat API...');
            let player = null;

            // ID Video dari link Anda: https://www.youtube.com/watch?v=QL1x8_W28k8
            const videoId = 'QL1x8_W28k8'; 

            const initPlayer = () => {
                // Membuat instance player YouTube
                player = new YT.Player('youtube-player', {
                    height: '0',
                    width: '0',
                    videoId: videoId,
                    events: {
                        onReady: () => { 
                            status.value = 'Siap Diputar'; 
                        },
                        onStateChange: (event) => {
                            // YT.PlayerState.PLAYING bernilai 1
                            isPlaying.value = (event.data === 1);
                            status.value = isPlaying.value ? 'Sedang Memutar' : 'Dijeda';
                        }
                    }
                });
            };

            const togglePlay = () => {
                if (!player) return;
                if (isPlaying.value) {
                    player.pauseVideo();
                } else {
                    player.playVideo();
                }
            };

            onMounted(() => {
                // 1. Memuat script API YouTube
                const tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                document.head.appendChild(tag);

                // 2. Fungsi ini dipanggil otomatis oleh API YouTube saat siap
                window.onYouTubeIframeAPIReady = () => {
                    initPlayer();
                };
            });

            return { isPlaying, status, togglePlay };
        }
    }).mount('#app');
</script>

</body>
</html>
