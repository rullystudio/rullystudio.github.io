<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue Playlist - Invidious API (No Ads)</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .player-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
        }
        h2 { text-align: center; color: #333; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 24px; font-size: 14px; }
        .now-playing {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: center;
        }
        .video-title { font-size: 18px; font-weight: 600; color: #2d3748; margin-bottom: 8px; word-break: break-word; }
        .video-channel { font-size: 14px; color: #4a5568; margin-bottom: 12px; }
        .counter { font-size: 14px; color: #718096; background: white; display: inline-block; padding: 4px 12px; border-radius: 20px; }
        .cover-art {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            margin: 0 auto 12px;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .cover-art img { width: 100%; height: 100%; object-fit: cover; }
        .controls {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin: 24px 0;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 100px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .progress-container { margin-top: 20px; }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.1s linear;
        }
        .time-info { display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: #718096; }
        .loading { text-align: center; color: #667eea; font-size: 14px; margin-top: 16px; }
        .error { text-align: center; color: #e53e3e; font-size: 14px; margin-top: 16px; background: #fed7d7; padding: 8px; border-radius: 12px; }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(102, 126, 234, 0.3); border-top-color: #667eea; border-radius: 50%; animation: spin 0.8s linear infinite; }
    </style>
</head>
<body>
    <div id="app">
        <div class="player-container">
            <h2>🎵 Playlist Bebas Iklan</h2>
            <div class="subtitle">Powered by Invidious API (No Ads)</div>

            <div class="now-playing">
                <div class="cover-art">
                    <img v-if="currentVideo.thumbnail" :src="currentVideo.thumbnail" :alt="currentVideo.title">
                    <div v-else class="no-image">🎵</div>
                </div>
                <div class="video-title">{{ currentVideo.title || 'Pilih lagu untuk mulai' }}</div>
                <div class="video-channel">{{ currentVideo.uploader || 'YouTube' }}</div>
                <div class="counter">Lagu ke: {{ currentIndex + 1 }} / {{ playlist.length }}</div>
            </div>

            <div class="controls">
                <button @click="prevSong" :disabled="loading">⏮ Sebelumnya</button>
                <button @click="togglePlay" :disabled="loading || !audioReady">
                    {{ isPlaying ? '⏸ Jeda' : '▶ Putar' }}
                </button>
                <button @click="nextSong" :disabled="loading">Selanjutnya ⏭</button>
            </div>

            <div class="progress-container" v-if="audioReady">
                <div class="progress-bar" @click="seekTo">
                    <div class="progress-fill" :style="{ width: progressPercent + '%' }"></div>
                </div>
                <div class="time-info">
                    <span>{{ formatTime(currentTime) }}</span>
                    <span>{{ formatTime(duration) }}</span>
                </div>
            </div>

            <div v-if="loading" class="loading">
                <span class="spinner"></span> Memuat lagu...
            </div>
            <div v-if="error" class="error">
                ⚠️ {{ error }}
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, onUnmounted, watch } = Vue;

        createApp({
            setup() {
                // Daftar ID YouTube (ganti dengan lagu favoritmu)
                const playlist = ref([
                    'dQw4w9WgXcQ',  // Rick Astley - Never Gonna Give You Up (test)
                    'jNQXAC9IVRw',  // Me at the zoo
                    'kJQP7kiw5Fk'   // Luis Fonsi - Despacito
                ]);
                
                const currentIndex = ref(0);
                const isPlaying = ref(false);
                const loading = ref(false);
                const error = ref('');
                const audioReady = ref(false);
                
                const currentVideo = ref({
                    title: '',
                    uploader: '',
                    thumbnail: '',
                    audioUrl: ''
                });
                
                let audioElement = null;
                const currentTime = ref(0);
                const duration = ref(0);
                const progressPercent = ref(0);
                let progressInterval = null;

                const formatTime = (seconds) => {
                    if (isNaN(seconds)) return '0:00';
                    const mins = Math.floor(seconds / 60);
                    const secs = Math.floor(seconds % 60);
                    return `${mins}:${secs.toString().padStart(2, '0')}`;
                };

                // Menggunakan Invidious API (lebih stabil)
                const fetchFromInvidious = async (videoId) => {
                    // Daftar server Invidious yang masih aktif (update terbaru Jan 2026)
                    const invidiousInstances = [
                        `https://inv.riverside.rocks/api/v1/videos/${videoId}`,
                        `https://invidious.privacydev.net/api/v1/videos/${videoId}`,
                        `https://inv.vern.cc/api/v1/videos/${videoId}`,
                        `https://invidious.nerdvpn.de/api/v1/videos/${videoId}`,
                        `https://y.com.cm/api/v1/videos/${videoId}`,
                        `https://invidious.flokinet.to/api/v1/videos/${videoId}`,
                        `https://inv.bp.projectsegfau.lt/api/v1/videos/${videoId}`
                    ];
                    
                    for (let instance of invidiousInstances) {
                        try {
                            console.log(`Mencoba: ${instance}`);
                            const controller = new AbortController();
                            const timeoutId = setTimeout(() => controller.abort(), 8000);
                            
                            const response = await fetch(instance, { 
                                signal: controller.signal,
                                headers: {
                                    'Accept': 'application/json'
                                }
                            });
                            clearTimeout(timeoutId);
                            
                            if (!response.ok) continue;
                            
                            const data = await response.json();
                            
                            // Cek format data Invidious
                            if (data.error) continue;
                            
                            // Set metadata
                            currentVideo.value = {
                                title: data.title || 'Judul tidak tersedia',
                                uploader: data.author || data.uploader || 'Unknown',
                                thumbnail: data.videoThumbnails?.[4]?.url || data.thumbnailUrl || `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`,
                                audioUrl: null
                            };
                            
                            // Cari format audio terbaik
                            let audioStream = null;
                            if (data.formatStreams && data.formatStreams.length > 0) {
                                // Cari yang audio only atau quality terbaik untuk audio
                                audioStream = data.formatStreams.find(f => 
                                    f.type?.includes('audio/mp4') || 
                                    f.type?.includes('audio/webm') ||
                                    f.qualityLabel?.includes('audio')
                                ) || data.formatStreams[0];
                            }
                            
                            if (audioStream && audioStream.url) {
                                currentVideo.value.audioUrl = audioStream.url;
                                return true;
                            }
                            
                            throw new Error('Stream audio tidak ditemukan');
                            
                        } catch (err) {
                            console.warn(`Gagal dari ${instance}:`, err.message);
                            continue;
                        }
                    }
                    return false;
                };

                const loadAndPlaySong = async () => {
                    if (audioElement) {
                        audioElement.pause();
                        audioElement.src = '';
                    }
                    audioReady.value = false;
                    loading.value = true;
                    error.value = '';
                    
                    const videoId = playlist.value[currentIndex.value];
                    
                    try {
                        const success = await fetchFromInvidious(videoId);
                        
                        if (!success || !currentVideo.value.audioUrl) {
                            throw new Error('Tidak bisa mendapatkan stream audio');
                        }
                        
                        if (!audioElement) {
                            audioElement = new Audio();
                            setupAudioEventListeners();
                        }
                        
                        audioElement.src = currentVideo.value.audioUrl;
                        audioElement.load();
                        
                        // Tunggu sampai audio siap
                        await new Promise((resolve) => {
                            audioElement.addEventListener('canplay', resolve, { once: true });
                            setTimeout(resolve, 3000);
                        });
                        
                        audioReady.value = true;
                        
                        // Coba putar otomatis
                        try {
                            await audioElement.play();
                            isPlaying.value = true;
                        } catch (autoplayError) {
                            console.log('Autoplay diblokir:', autoplayError);
                            error.value = 'Klik tombol play untuk mulai (autoplay diblokir browser)';
                            isPlaying.value = false;
                        }
                        
                        loading.value = false;
                        
                    } catch (err) {
                        console.error('Error:', err);
                        error.value = `Gagal memuat lagu. Coba lagu lain.`;
                        loading.value = false;
                        audioReady.value = false;
                    }
                };

                const setupAudioEventListeners = () => {
                    if (!audioElement) return;
                    
                    audioElement.addEventListener('timeupdate', () => {
                        currentTime.value = audioElement.currentTime;
                        if (duration.value > 0) {
                            progressPercent.value = (currentTime.value / duration.value) * 100;
                        }
                    });
                    
                    audioElement.addEventListener('loadedmetadata', () => {
                        duration.value = audioElement.duration;
                    });
                    
                    audioElement.addEventListener('ended', () => {
                        nextSong();
                    });
                    
                    audioElement.addEventListener('play', () => {
                        isPlaying.value = true;
                        startProgressTimer();
                    });
                    
                    audioElement.addEventListener('pause', () => {
                        isPlaying.value = false;
                        stopProgressTimer();
                    });
                    
                    audioElement.addEventListener('error', (e) => {
                        console.error('Audio error:', e);
                        error.value = 'Error memutar, mencoba lagu berikutnya';
                        nextSong();
                    });
                };
                
                const startProgressTimer = () => {
                    stopProgressTimer();
                    progressInterval = setInterval(() => {
                        if (audioElement && !audioElement.paused) {
                            currentTime.value = audioElement.currentTime;
                            if (duration.value > 0) {
                                progressPercent.value = (currentTime.value / duration.value) * 100;
                            }
                        }
                    }, 200);
                };
                
                const stopProgressTimer = () => {
                    if (progressInterval) {
                        clearInterval(progressInterval);
                        progressInterval = null;
                    }
                };

                const togglePlay = async () => {
                    if (!audioElement || !audioReady.value) {
                        await loadAndPlaySong();
                        return;
                    }
                    
                    if (isPlaying.value) {
                        audioElement.pause();
                    } else {
                        try {
                            await audioElement.play();
                        } catch (err) {
                            error.value = 'Gagal memutar, coba refresh';
                        }
                    }
                };
                
                const nextSong = () => {
                    currentIndex.value = (currentIndex.value + 1) % playlist.value.length;
                    loadAndPlaySong();
                };
                
                const prevSong = () => {
                    currentIndex.value = (currentIndex.value - 1 + playlist.value.length) % playlist.value.length;
                    loadAndPlaySong();
                };
                
                const seekTo = (event) => {
                    if (!audioElement || !duration.value) return;
                    const rect = event.currentTarget.getBoundingClientRect();
                    const x = event.clientX - rect.left;
                    const percent = x / rect.width;
                    audioElement.currentTime = percent * duration.value;
                };

                watch(currentIndex, () => {
                    loadAndPlaySong();
                });

                onMounted(() => {
                    loadAndPlaySong();
                });
                
                onUnmounted(() => {
                    if (audioElement) {
                        audioElement.pause();
                        audioElement.src = '';
                    }
                    stopProgressTimer();
                });

                return {
                    playlist,
                    currentIndex,
                    isPlaying,
                    loading,
                    error,
                    audioReady,
                    currentVideo,
                    currentTime,
                    duration,
                    progressPercent,
                    formatTime,
                    togglePlay,
                    nextSong,
                    prevSong,
                    seekTo
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
