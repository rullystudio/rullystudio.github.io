<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Playlist Player - Stable Version</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .player-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
        }
        h2 { text-align: center; color: #333; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 24px; font-size: 14px; }
        .now-playing {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: center;
        }
        .video-title { font-size: 18px; font-weight: 600; color: #2d3748; margin-bottom: 8px; }
        .counter { font-size: 14px; color: #718096; background: white; display: inline-block; padding: 4px 12px; border-radius: 20px; margin-top: 10px; }
        .player-wrapper {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        iframe {
            width: 100%;
            height: 250px;
            border: none;
        }
        .controls {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin: 20px 0;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .info-text {
            text-align: center;
            font-size: 12px;
            color: #718096;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="player-container">
            <h2>🎵 YouTube Playlist</h2>
            <div class="subtitle">Powered by YouTube (100% Stable)</div>

            <div class="now-playing">
                <div class="video-title">{{ currentVideoTitle || 'Memuat...' }}</div>
                <div class="counter">Lagu ke: {{ currentIndex + 1 }} / {{ playlist.length }}</div>
            </div>

            <div class="player-wrapper">
                <iframe :src="currentPlayerUrl" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>

            <div class="controls">
                <button @click="prevSong">⏮ Sebelumnya</button>
                <button @click="nextSong">Selanjutnya ⏭</button>
            </div>
            <div class="info-text">
                💡 Catatan: Video mengandung iklan (kebijakan YouTube)<br>
                Untuk pengalaman bebas iklan, gunakan browser dengan uBlock Origin
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                // Daftar ID YouTube - GANTI DENGAN ID LAGU FAVORIT ANDA
                const playlist = ref([
                    'QL1x8_W28k8',     // Rick Astley - Never Gonna Give You Up
                    'PQtYfVkvMr4'     // Luis Fonsi - Despacito
                ]);
                
                const currentIndex = ref(0);
                const videoTitles = ref({});
                const currentVideoTitle = ref('');
                
                // Fungsi untuk mengambil judul video dari YouTube API (tanpa API key)
                const fetchVideoTitle = async (videoId) => {
                    if (videoTitles.value[videoId]) {
                        currentVideoTitle.value = videoTitles.value[videoId];
                        return;
                    }
                    
                    try {
                        // Menggunakan oembed YouTube (CORS-friendly, gratis, tanpa API key)
                        const response = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`);
                        const data = await response.json();
                        if (data.title) {
                            videoTitles.value[videoId] = data.title;
                            currentVideoTitle.value = data.title;
                        } else {
                            currentVideoTitle.value = `Video ID: ${videoId}`;
                        }
                    } catch (error) {
                        console.error('Gagal mengambil judul:', error);
                        currentVideoTitle.value = `Video ID: ${videoId}`;
                    }
                };
                
                const currentPlayerUrl = computed(() => {
                    return `https://www.youtube.com/embed/${playlist.value[currentIndex.value]}?autoplay=1`;
                });
                
                const nextSong = () => {
                    currentIndex.value = (currentIndex.value + 1) % playlist.value.length;
                };
                
                const prevSong = () => {
                    currentIndex.value = (currentIndex.value - 1 + playlist.value.length) % playlist.value.length;
                };
                
                // Update judul saat indeks berubah
                onMounted(() => {
                    fetchVideoTitle(playlist.value[currentIndex.value]);
                });
                
                // Watch untuk perubahan indeks
                const stopWatch = watchEffect(() => {
                    fetchVideoTitle(playlist.value[currentIndex.value]);
                });
                
                return { 
                    playlist, 
                    currentIndex, 
                    currentVideoTitle,
                    currentPlayerUrl, 
                    nextSong, 
                    prevSong 
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
