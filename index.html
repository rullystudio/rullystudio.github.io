<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaris Palet - CRUD Modal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0"><i class="bi bi-box-seam"></i> Inventaris Item Palet</h5>
            <button class="btn btn-light btn-sm" onclick="showModalTambah()">
                <i class="bi bi-plus-lg"></i> Tambah Item
            </button>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Nama Item</th>
                            <th class="text-center">Jml/Palet</th>
                            <th class="text-center">Tumpukan</th>
                            <th class="text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="itemModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Tambah Item</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editIndex">
                <div class="mb-3">
                    <label class="form-label">Nama Item</label>
                    <input type="text" id="nama_item" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Jumlah per Palet</label>
                    <input type="number" id="jml_per_palet" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Jumlah Tumpukan</label>
                    <input type="number" id="jml_tumpukan" class="form-control" required>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                <button type="button" class="btn btn-primary" onclick="simpanData()">Simpan Data</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-info text-white">
                <h5 class="modal-title">Detail Item</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="detailContent">
                </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let dbItems = JSON.parse(localStorage.getItem('db_items')) || [];
    const itemModal = new bootstrap.Modal(document.getElementById('itemModal'));
    const detailModal = new bootstrap.Modal(document.getElementById('detailModal'));

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        dbItems.forEach((item, index) => {
            tbody.innerHTML += `
                <tr>
                    <td class="fw-bold">${item.nama_item}</td>
                    <td class="text-center">${item.jml_per_palet}</td>
                    <td class="text-center">${item.jml_tumpukan}</td>
                    <td class="text-center">
                        <button class="btn btn-info btn-sm text-white" onclick="showDetail(${index})"><i class="bi bi-eye"></i></button>
                        <button class="btn btn-warning btn-sm text-white" onclick="showModalEdit(${index})"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-danger btn-sm" onclick="hapusData(${index})"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>`;
        });
        localStorage.setItem('db_items', JSON.stringify(dbItems));
    }

    function showModalTambah() {
        document.getElementById('modalTitle').innerText = "Tambah Item";
        document.getElementById('editIndex').value = "-1";
        document.getElementById('nama_item').value = "";
        document.getElementById('jml_per_palet').value = "";
        document.getElementById('jml_tumpukan').value = "";
        itemModal.show();
    }

    function showModalEdit(index) {
        const item = dbItems[index];
        document.getElementById('modalTitle').innerText = "Edit Item";
        document.getElementById('editIndex').value = index;
        document.getElementById('nama_item').value = item.nama_item;
        document.getElementById('jml_per_palet').value = item.jml_per_palet;
        document.getElementById('jml_tumpukan').value = item.jml_tumpukan;
        itemModal.show();
    }

    function simpanData() {
        const index = document.getElementById('editIndex').value;
        const data = {
            id_item: index == "-1" ? Date.now() : dbItems[index].id_item,
            nama_item: document.getElementById('nama_item').value,
            jml_per_palet: parseInt(document.getElementById('jml_per_palet').value),
            jml_tumpukan: parseInt(document.getElementById('jml_tumpukan').value)
        };

        if(!data.nama_item || isNaN(data.jml_per_palet)) return alert("Data tidak valid!");

        if(index == "-1") {
            dbItems.push(data);
        } else {
            dbItems[index] = data;
        }

        renderTable();
        itemModal.hide();
    }

    function showDetail(index) {
        const item = dbItems[index];
        const totalUnit = item.jml_per_palet * item.jml_tumpukan;
        document.getElementById('detailContent').innerHTML = `
            <table class="table table-sm table-borderless">
                <tr><th>ID Item</th><td>: ${item.id_item}</td></tr>
                <tr><th>Nama Item</th><td>: ${item.nama_item}</td></tr>
                <tr><th>Jumlah per Palet</th><td>: ${item.jml_per_palet} unit</td></tr>
                <tr><th>Jumlah Tumpukan</th><td>: ${item.jml_tumpukan} tumpuk</td></tr>
                <tr class="table-info"><th>Total Kapasitas</th><td>: <strong>${totalUnit} unit</strong></td></tr>
            </table>
        `;
        detailModal.show();
    }

    function hapusData(index) {
        if(confirm("Hapus item ini?")) {
            dbItems.splice(index, 1);
            renderTable();
        }
    }

    renderTable();
</script>

</body>
</html>
