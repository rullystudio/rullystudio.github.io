<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go-Laundry Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #2e60e6;
        }
        body {
            background-color: var(--primary-blue);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: flex-end; /* Membuat card muncul dari bawah seperti di mobile */
        }
        .login-card {
            background: white;
            width: 100%;
            height: 85vh;
            border-radius: 40px 40px 0 0;
            padding: 40px 30px;
            box-shadow: 0px -5px 15px rgba(0,0,0,0.1);
        }
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            font-size: 50px;
            color: var(--primary-blue);
        }
        .brand-name {
            color: var(--primary-blue);
            font-weight: 800;
            letter-spacing: 1px;
            margin-top: 5px;
            font-size: 24px;
        }
        .brand-tagline {
            font-size: 10px;
            color: #666;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: -5px;
        }
        .form-label {
            font-weight: 600;
            color: #444;
            margin-bottom: 5px;
        }
        .input-group-text {
            background-color: transparent;
            border-right: none;
            color: #999;
        }
        .form-control {
            border-left: none;
            padding: 12px;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }
        .btn-login {
            background-color: var(--primary-blue);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            margin-top: 20px;
        }
        .social-login {
            margin-top: 40px;
            text-align: center;
        }
        .social-icons i {
            font-size: 28px;
            margin: 0 15px;
            cursor: pointer;
        }
        .fa-facebook { color: #1877F2; }
        .fa-google { color: #DB4437; }
        .fa-apple { color: #000; }
        
        .register-link {
            text-align: center;
            margin-top: 40px;
            font-size: 14px;
            color: #666;
        }
        .register-link a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
        }

        /* Penyesuaian untuk tampilan desktop */
        @media (min-width: 768px) {
            body {
                align-items: center;
                justify-content: center;
            }
            .login-card {
                width: 400px;
                height: auto;
                border-radius: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold m-0">Selamat Datang!</h2>
            <p class="text-muted small">Login, dan coba fitur GoLaundry</p>
        </div>

        <div class="logo-section">
            <i class="fa-solid fa-soap logo-icon"></i> <div class="brand-name">GO-LAUNDRY</div>
            <div class="brand-tagline">Let Us Handle It</div>
        </div>

        <form>
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-regular fa-user"></i></span>
                    <input type="text" class="form-control" placeholder="Masukan Username">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control" placeholder="*******">
                    <span class="input-group-text" style="border-left: none; border-right: 1px solid #dee2e6;"><i class="fa-regular fa-eye"></i></span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-login w-100">Login</button>
        </form>

        <div class="social-login">
            <p class="text-muted small">You can Connect with</p>
            <div class="social-icons">
                <i class="fa-brands fa-facebook"></i>
                <i class="fa-brands fa-google" style="color: #FFC107;"></i>
                <i class="fa-brands fa-apple"></i>
            </div>
        </div>

        <div class="register-link">
            Belum punya akun? <a href="#">Registrasi</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
