<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro GPS Camera - Custom Date</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; }
        
        /* Area Kamera */
        #camera-box { 
            position: relative; 
            width: 100%; 
            background: #000; 
            border-radius: 10px; 
            overflow: hidden; 
            border: 2px solid #333;
        }
        video { width: 100%; display: block; }

        /* Panel Pengaturan (Input Tanggal) */
        .settings-panel {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: left;
        }
        label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        input[type="datetime-local"] {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            margin-bottom: 15px;
        }

        .controls { margin-top: 15px; text-align: center; }
        button { 
            background: #007bff; color: white; border: none; 
            padding: 15px 30px; border-radius: 50px; font-weight: bold; 
            cursor: pointer; width: 100%; font-size: 16px;
        }
        button:active { background: #0056b3; }

        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h3>GPS Map Camera (Custom Date)</h3>
    
    <div id="camera-box">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="settings-panel">
        <label>Atur Tanggal & Waktu Foto:</label>
        <input type="datetime-local" id="custom-date">
        <p style="font-size: 11px; color: #888;">*Jika dikosongkan, akan menggunakan waktu saat ini.</p>
    </div>

    <div class="controls">
        <button id="capture">AMBIL FOTO & SIMPAN</button>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
$(document).ready(function() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let lat = "", lon = "", address = "", plusCode = "";

    // Set default datetime-local ke sekarang
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById('custom-date').value = now.toISOString().slice(0, 16);

    // Ambil akses kamera
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => alert("Kamera error: " + err));

    // Ambil GPS & Alamat
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            lat = pos.coords.latitude.toFixed(6);
            lon = pos.coords.longitude.toFixed(6);
            
            // Get Address via Nominatim
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
                .then(res => res.json())
                .then(data => {
                    address = data.display_name;
                });
        }, null, { enableHighAccuracy: true });
    }

    $('#capture').click(function() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // --- DRAW WATERMARK BOX (Kanan Bawah) ---
        const boxW = canvas.width * 0.65;
        const boxH = 140;
        const margin = 20;
        const x = canvas.width - boxW - margin;
        const y = canvas.height - boxH - margin;

        // Background Hitam Transparan
        ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
        ctx.beginPath();
        ctx.roundRect(x, y, boxW, boxH, 10);
        ctx.fill();

        // Teks Atas (Kecamatan/Provinsi)
        ctx.fillStyle = "white";
        ctx.font = "bold 20px Arial";
        const addrParts = address.split(',');
        const mainAddr = addrParts[1] ? addrParts[1].trim() + ", " + addrParts[2].trim() : "Lokasi Terdeteksi";
        ctx.fillText(mainAddr, x + 15, y + 30);

        // Detail Alamat & Koordinat
        ctx.font = "14px Arial";
        ctx.fillStyle = "#ddd";
        
        // Wrap text untuk alamat panjang
        const displayAddr = address.substring(0, 85) + "...";
        ctx.fillText(displayAddr, x + 15, y + 55, boxW - 30);
        
        ctx.fillText(`Lat ${lat}° Long ${lon}°`, x + 15, y + 85);

        // Tanggal & Jam (Custom)
        const userDate = new Date($('#custom-date').val());
        const options = { weekday: 'long', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' };
        const dateString = userDate.toLocaleString('id-ID', options) + " GMT +07:00";
        
        ctx.fillStyle = "white";
        ctx.font = "14px Arial";
        ctx.fillText(dateString, x + 15, y + 115);

        // --- DRAW MINI MAP SIMULATION (Kiri Bawah) ---
        const mapSize = 140;
        const mx = margin;
        const my = canvas.height - mapSize - margin;
        
        ctx.fillStyle = "#333";
        ctx.beginPath();
        ctx.roundRect(mx, my, mapSize, mapSize, 10);
        ctx.fill();
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Label Peta Sederhana
        ctx.fillStyle = "white";
        ctx.font = "bold 12px Arial";
        ctx.fillText("Google", mx + 10, my + mapSize - 10);

        // Download
        const link = document.createElement('a');
        link.download = `GPS_Custom_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
});
</script>
</body>
</html>
