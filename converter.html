<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Watermark - Split Layout</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background: #333; color: white; padding: 20px; }
        .upload-box { background: #444; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 2px dashed #666; }
        canvas { max-width: 100%; height: auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); display: none; border: 1px solid #555; }
        button { padding: 12px 25px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <h2>GPS Map Camera - Split Watermark</h2>
    
    <div class="upload-box">
        <label for="upload">Pilih Foto dari Galeri:</label><br><br>
        <input type="file" id="upload" accept="image/*">
    </div>

    <canvas id="mainCanvas"></canvas>
    <button id="downloadBtn">Download Hasil Foto</button>

<script>
$(document).ready(function() {
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    
    // DATA STATIS (Teks yang dikunci)
    const data = {
        judul: "Kecamatan Ngoro, Jawa Timur,",
        negara: "Indonesia 🇮🇩",
        alamat: "87rc+5rp, Ganjul, Kertorejo, Kec. Ngoro, Kabupaten Jombang, Jawa Timur 61473, Indonesia",
        koordinat: "Lat -7.659832° Long 112.272545°",
        waktu: "Minggu, 03/05/2026 10:17 AM GMT +07:00",
        appLabel: "GPS Map Camera"
    };

    $('#upload').change(function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                prosesWatermark(img);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    function prosesWatermark(img) {
        // Set ukuran canvas sesuai gambar asli
        const w = img.width;
        const h = img.height;
        canvas.width = w;
        canvas.height = h;

        // 1. Gambar Foto Asli
        ctx.drawImage(img, 0, 0);

        // 2. Tentukan ukuran elemen berdasarkan lebar gambar agar proporsional
        const padding = w * 0.03;
        const totalHeight = h * 0.3; // Tinggi total area watermark
        const watermarkY = h - totalHeight - padding;
        const mapSize = totalHeight * 0.8; // Ukuran kotak peta (persegi)
        
        // --- A. Kotak Peta Terpisah (Kiri) ---
        const mapX = padding;
        const mapY = watermarkY + (totalHeight * 0.1);
        ctx.fillStyle = "#2c3e50"; // Placeholder warna peta
        roundRect(ctx, mapX, mapY, mapSize, mapSize, 15, true);
        
        // Placeholder Pin Merah Sederhana di tengah peta
        ctx.fillStyle = "red";
        ctx.beginPath();
        ctx.arc(mapX + (mapSize/2), mapY + (mapSize/2), 10, 0, Math.PI * 2);
        ctx.fill();

        // --- B. Kotak Keterangan Teks Terpisah (Kanan) ---
        const textX = mapX + mapSize + (padding * 0.5);
        const textWidth = w - textX - padding;
        ctx.fillStyle = "rgba(0, 0, 0, 0.5)"; // Latar belakang transparan teks
        roundRect(ctx, textX, watermarkY, textWidth, totalHeight, 15, true);

        // --- C. Gambar Teks Keterangan ---
        ctx.fillStyle = "white";
        ctx.textAlign = "left";
        const textPadding = textWidth * 0.05;
        const textStartY = watermarkY + textPadding;

        // Judul (Bold)
        const sizeBesar = Math.round(w * 0.035);
        ctx.font = `bold ${sizeBesar}px Arial`;
        ctx.fillText(data.judul, textX + textPadding, textStartY + sizeBesar);
        ctx.fillText(data.negara, textX + textPadding, textStartY + (sizeBesar * 2));

        // Alamat & Detail (Regular)
        const sizeKecil = Math.round(w * 0.022);
        ctx.font = `${sizeKecil}px Arial`;
        const alamatY = textStartY + (sizeBesar * 3);
        wrapText(ctx, data.alamat, textX + textPadding, alamatY, textWidth - (textPadding * 2), sizeKecil * 1.2);

        // Koordinat & Waktu (Bawah)
        ctx.fillText(data.koordinat, textX + textPadding, h - padding - (totalHeight * 0.2));
        ctx.fillText(data.waktu, textX + textPadding, h - padding - (totalHeight * 0.1));

        // --- D. Label Aplikasi di Kanan Atas ---
        ctx.fillStyle = "white";
        ctx.textAlign = "right";
        ctx.font = `bold ${sizeKecil}px Arial`;
        ctx.fillText(data.appLabel, w - padding, watermarkY - (sizeKecil * 0.5));

        // Tampilkan Canvas dan Tombol Download
        $(canvas).show();
        $('#downloadBtn').show();
    }

    // Fungsi pembantu membuat kotak rounded
    function roundRect(ctx, x, y, width, height, radius, fill) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
        if (fill) ctx.fill();
    }

    // Fungsi pembantu membungkus teks
    function wrapText(context, text, x, y, maxWidth, lineHeight) {
        var words = text.split(' ');
        var line = '';
        for(var n = 0; n < words.length; n++) {
            var testLine = line + words[n] + ' ';
            var metrics = context.measureText(testLine);
            var testWidth = metrics.width;
            if (testWidth > maxWidth && n > 0) {
                context.fillText(line, x, y);
                line = words[n] + ' ';
                y += lineHeight;
            } else { line = testLine; }
        }
        context.fillText(line, x, y);
    }

    // Fungsi Download
    $('#downloadBtn').click(function() {
        const link = document.createElement('a');
        link.download = 'GPS_Photo_Split.jpg';
        link.href = canvas.toDataURL('image/jpeg', 0.9);
        link.click();
    });
});
</script>
</body>
</html>
